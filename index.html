<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff8c00" />
    <meta name="description" content="MineGuard - Sistema de Gestão de Segurança Operacional para Mineração" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MineGuard" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23000' width='192' height='192'/><rect fill='%23ff8c00' x='40' y='40' width='112' height='112' rx='16'/></svg>" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23000' width='100' height='100'/><rect fill='%23ff8c00' x='25' y='25' width='50' height='50' rx='8'/></svg>" />
    <title>MineGuard - Sistema de Segurança de Mina</title>
      <script>
      if (location.hostname === ''localhost'' || location.hostname === ''127.0.0.1'') {
        if (location.protocol === ''http:'') {
          location.replace(`https://${location.hostname}:2026${location.pathname}${location.search}${location.hash}`);
        }
      }
    </script>  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
